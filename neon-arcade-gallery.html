
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>霓虹街机 — 回忆画廊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        oklch(15% 0.02 280);
      --surface:   oklch(18% 0.025 280);
      --fg:        oklch(95% 0.03 320);
      --muted:     oklch(70% 0.18 320);
      --border:    oklch(65% 0.20 190);
      --accent:    oklch(60% 0.25 290);
      --pixel-size: 4px;
      --glow-pink: oklch(60% 0.25 290);
      --glow-cyan: oklch(65% 0.20 190);
      --font-display: 'Press Start 2P', 'Noto Sans SC', monospace;
      --font-body:    'VT323', 'Noto Sans SC', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      image-rendering: pixelated;
      position: relative;
      overflow-y: auto;
      padding: 40px 20px;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 2px, transparent 2px, transparent 4px);
      pointer-events: none;
      z-index: 100;
    }
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: linear-gradient(var(--surface) 1px, transparent 1px), linear-gradient(90deg, var(--surface) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }
    .container {
      width: 100%;
      max-width: 900px;
      padding: 48px;
      background: var(--surface);
      border: 8px solid var(--glow-cyan);
      box-shadow: 0 0 0 4px var(--bg), 0 0 30px var(--glow-cyan), 0 0 60px var(--glow-cyan), inset 0 0 30px rgba(0, 255, 255, 0.1);
      position: relative;
      z-index: 1;
      min-height: 500px;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0 auto;
    }
    .container::before {
      content: '';
      position: absolute;
      top: -8px; left: -8px; right: -8px; bottom: -8px;
      border: 4px solid var(--glow-cyan);
      pointer-events: none;
      box-shadow: 0 0 20px var(--glow-cyan);
    }
    .gallery-title {
      font-family: var(--font-display);
      font-size: 24px;
      color: var(--fg);
      text-shadow: 0 0 15px var(--glow-cyan);
      margin-bottom: 32px;
      text-align: center;
    }
    .gallery-image-container {
      width: 100%;
      padding: 20px;
      position: relative;
      min-height: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }
    .loading-state {
      font-family: var(--font-display);
      font-size: 18px;
      color: var(--glow-cyan);
      text-shadow: 0 0 15px var(--glow-cyan);
      animation: loading-pulse 1.5s ease-in-out infinite;
    }
    @keyframes loading-pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    .gallery-image {
      max-width: 100%;
      max-height: 400px;
      border: 4px solid var(--glow-cyan);
      box-shadow: 0 0 20px var(--glow-cyan), 0 0 40px var(--glow-cyan);
      image-rendering: pixelated;
      display: none;
      margin-bottom: 20px;
    }
    .gallery-canvas {
      max-width: 100%;
      max-height: 400px;
      border: 4px solid var(--glow-cyan);
      box-shadow: 0 0 20px var(--glow-cyan), 0 0 40px var(--glow-cyan);
      image-rendering: pixelated;
      cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><circle cx="16" cy="16" r="14" fill="none" stroke="%2300ffff" stroke-width="2" opacity="0.8"/></svg>') 16 16, crosshair;
      display: none;
      margin-bottom: 20px;
    }
    .back-btn {
      margin-top: 32px;
      margin-bottom: 20px;
      padding: 16px 48px;
      font-family: var(--font-display);
      font-size: 14px;
      background: var(--bg);
      color: var(--glow-cyan);
      border: 4px solid var(--glow-cyan);
      cursor: pointer;
      letter-spacing: 2px;
      box-shadow: 0 0 15px var(--glow-cyan);
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .back-btn:hover {
      background: var(--glow-cyan);
      color: var(--bg);
      box-shadow: 0 0 25px var(--glow-cyan), 0 0 50px var(--glow-cyan);
    }
    .cat-image {
      width: 280px; height: 280px;
      position: fixed;
      bottom: 20px;
      left: 20px;
      filter: drop-shadow(0 0 20px var(--glow-pink)) drop-shadow(0 0 40px var(--glow-cyan));
      cursor: grab;
      user-select: none;
      transition: filter 0.2s;
      z-index: 50;
      pointer-events: auto;
    }
    .cat-image:active { cursor: grabbing; }
    .cat-image.purring { animation: purr 0.1s infinite; }
    .cat-image.happy { filter: drop-shadow(0 0 30px var(--glow-pink)) drop-shadow(0 0 50px var(--glow-cyan)) brightness(1.2); }
    @keyframes purr {
      0%, 100% { transform: translate(-1px, -1px); }
      25% { transform: translate(1px, 1px); }
      50% { transform: translate(-1px, 1px); }
      75% { transform: translate(1px, -1px); }
    }
    .mosaic-flash {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 50;
      display: grid;
      grid-template-columns: repeat(20, 1fr);
      grid-template-rows: repeat(15, 1fr);
      gap: 3px;
    }
    .mosaic-cell { background: transparent; opacity: 0; }

    /* 转场动画覆盖层 */
    .page-transition {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 1000;
      display: grid;
      grid-template-columns: repeat(20, 1fr);
      grid-template-rows: repeat(15, 1fr);
      gap: 2px;
      opacity: 1;
    }
    .page-transition-cell {
      background: var(--glow-cyan);
      opacity: 1;
      transform: scale(1);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .page-transition-cell.fade {
      opacity: 0;
      transform: scale(1);
    }

    /* 页面加载淡入效果 */
    .page-content {
      opacity: 0;
      transition: opacity 0.6s ease 0.4s;
    }
    .page-content.loaded {
      opacity: 1;
    }

    @media (max-width: 900px) {
      .container { padding: 32px 24px; margin: 20px; }
      .cat-image { width: 180px; height: 180px; bottom: 10px; left: 10px; }
      .gallery-image { max-height: 300px; }
      .gallery-title { font-size: 18px; }
    }

    /* 赛博小猫对话区域 */
    .cat-chat-section {
      margin-top: 32px;
      padding: 24px;
      background: var(--bg);
      border: 4px solid var(--glow-pink);
      box-shadow: 0 0 20px var(--glow-pink), inset 0 0 10px rgba(255, 0, 179, 0.1);
      border-radius: 8px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    .cat-chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .cat-chat-avatar {
      width: 48px;
      height: 48px;
      border: 3px solid var(--glow-pink);
      border-radius: 8px;
      image-rendering: pixelated;
    }
    .cat-chat-title {
      font-family: var(--font-display);
      font-size: 14px;
      color: var(--glow-pink);
      text-shadow: 0 0 10px var(--glow-pink);
    }
    .cat-chat-bubble {
      position: relative;
      background: var(--surface);
      padding: 16px 20px;
      border-radius: 12px;
      border: 2px solid var(--border);
      font-family: var(--font-body);
      font-size: 18px;
      line-height: 1.6;
      color: var(--fg);
      min-height: 60px;
    }
    .cat-chat-bubble::before {
      content: '';
      position: absolute;
      top: -10px;
      left: 30px;
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-bottom: 10px solid var(--border);
    }
    .cat-chat-loading {
      display: inline-block;
      animation: cat-typing 1s ease-in-out infinite;
    }
    @keyframes cat-typing {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container page-content" id="page-content">
    <h1 class="gallery-title">回忆画廊</h1>
    <div class="gallery-image-container">
      <div class="loading-state" id="loading-state">🔄 正在生成图片...</div>
      <img src="" alt="生成的回忆图片" class="gallery-image" id="gallery-image" crossorigin="anonymous">
      <canvas class="gallery-canvas" id="gallery-canvas"></canvas>
    </div>

    <!-- 赛博小猫对话区域 -->
    <div class="cat-chat-section" id="cat-chat-section" style="display: none;">
      <div class="cat-chat-header">
        <img src="4e21a342-192a-4c88-9394-0a5f0899d8f2-removebg-preview.png" alt="霓虹喵" class="cat-chat-avatar">
        <div class="cat-chat-title">🐱 霓虹喵的评论</div>
      </div>
      <div class="cat-chat-bubble" id="cat-chat-bubble">
        <span class="cat-chat-loading">正在思考喵~</span>
      </div>
    </div>

    <a href="neon-arcade-menu.html" class="back-btn" data-transition>返回</a>
  </div>
  <img src="4e21a342-192a-4c88-9394-0a5f0899d8f2-removebg-preview.png" alt="像素猫" class="cat-image" id="cat">
  <div class="mosaic-flash" id="mosaic-overlay"></div>
  <div class="page-transition" id="page-transition"></div>
  <script>
    // 画廊 Canvas 马赛克交互
    const galleryImage = document.getElementById('gallery-image');
    const galleryCanvas = document.getElementById('gallery-canvas');
    const loadingState = document.getElementById('loading-state');
    const catChatSection = document.getElementById('cat-chat-section');
    const catChatBubble = document.getElementById('cat-chat-bubble');
    const ctx = galleryCanvas.getContext('2d');
    const mosaicSize = 32;
    let img = new Image();
    let canvasWidth, canvasHeight;
    let mousePos = { x: -1000, y: -1000 };
    let revealMap = [];
    let revealRadius = 3;
    let revealIncrement = 0.04;

    // 页面加载时检查是否有生成的图片
    function initGallery() {
      const generatedImageUrl = sessionStorage.getItem('generatedImageUrl');
      const generatedPrompt = sessionStorage.getItem('generatedImagePrompt');
      const userProfile = JSON.parse(sessionStorage.getItem('userProfile') || '{}');

      if (generatedImageUrl) {
        // 显示生成的图片
        const galleryTitle = document.querySelector('.gallery-title');
        if (galleryTitle && generatedPrompt) {
          galleryTitle.textContent = '🎨 ' + generatedPrompt;
        }
        loadGalleryImage(generatedImageUrl);

        // 调用 AI 生成赛博小猫的回复
        if (generatedPrompt) {
          generateCatReply(generatedPrompt, userProfile);
        }
      } else {
        // 没有图片，隐藏加载状态
        loadingState.style.display = 'none';
        const galleryTitle = document.querySelector('.gallery-title');
        if (galleryTitle) {
          galleryTitle.textContent = '暂无图片';
        }
      }
    }

    // 调用 AI 生成赛博小猫回复
    async function generateCatReply(prompt, userProfile) {
      catChatSection.style.display = 'block';
      catChatBubble.innerHTML = '<span class="cat-chat-loading">霓虹喵正在思考喵~ 🐾</span>';

      try {
        const response = await fetch('http://localhost:3000/api/cat-chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, userProfile })
        });

        const result = await response.json();

        if (result.success && result.message) {
          // 打字机效果显示回复
          typeWriterEffect(result.message);
        } else {
          catChatBubble.textContent = '喵~ 霓虹喵今天有点累，等会再聊吧~ 😿';
        }
      } catch (error) {
        console.error('AI 对话失败:', error);
        catChatBubble.textContent = '喵？信号不太好... 霓虹喵听不清你在说什么~ 📡';
      }
    }

    // 打字机效果显示回复
    function typeWriterEffect(text) {
      let index = 0;
      catChatBubble.innerHTML = '';

      function type() {
        if (index < text.length) {
          catChatBubble.textContent += text[index];
          index++;
          setTimeout(type, 50); // 每个字符的延迟
        }
      }
      type();
    }

    function loadGalleryImage(imageUrl) {
      console.log('加载图片:', imageUrl);
      loadingState.textContent = '🔄 正在加载图片...';

      img.crossOrigin = 'anonymous';
      img.onload = () => {
        console.log('图片加载成功:', img.width, 'x', img.height);
        canvasWidth = img.width;
        canvasHeight = img.height;
        galleryCanvas.width = canvasWidth;
        galleryCanvas.height = canvasHeight;

        const cols = Math.ceil(canvasWidth / mosaicSize);
        const rows = Math.ceil(canvasHeight / mosaicSize);
        revealMap = new Array(cols * rows).fill(0);

        // 隐藏加载状态，显示 Canvas
        loadingState.style.display = 'none';
        galleryCanvas.style.display = 'block';

        drawMosaic();
      };
      img.onerror = (e) => {
        console.error('图片加载失败:', imageUrl, e);
        loadingState.textContent = '❌ 图片加载失败，请重试';
        loadingState.style.display = 'block';
      };
      img.src = imageUrl;
    }

    initGallery();

    function drawMosaic() {
      ctx.clearRect(0, 0, canvasWidth, canvasHeight);

      // 创建临时 Canvas 用于马赛克处理
      const tempCanvas = document.createElement('canvas');
      const smallWidth = Math.floor(canvasWidth / mosaicSize);
      const smallHeight = Math.floor(canvasHeight / mosaicSize);
      tempCanvas.width = smallWidth;
      tempCanvas.height = smallHeight;
      const tempCtx = tempCanvas.getContext('2d');
      tempCtx.imageSmoothingEnabled = false;

      // 绘制缩小图 - 使用 img 对象而不是 galleryImage
      tempCtx.drawImage(img, 0, 0, smallWidth, smallHeight);

      // 绘制马赛克
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(tempCanvas, 0, 0, smallWidth, smallHeight, 0, 0, canvasWidth, canvasHeight);

      // 获取鼠标位置周围的块
      const cols = Math.ceil(canvasWidth / mosaicSize);
      const rows = Math.ceil(canvasHeight / mosaicSize);
      const mouseCol = Math.floor(mousePos.x / mosaicSize);
      const mouseRow = Math.floor(mousePos.y / mosaicSize);

      // 更新揭示映射（圆形区域）— 鼠标划过即触发
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const dx = col - mouseCol;
          const dy = row - mouseRow;
          const distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < revealRadius) {
            const idx = row * cols + col;
            const revealLevel = Math.min(1, (revealRadius - distance) / revealRadius);
            revealMap[idx] = Math.min(1, revealMap[idx] + revealLevel * revealIncrement);
          }
        }
      }

      // 绘制揭示区域
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const idx = row * cols + col;
          const revealAmount = revealMap[idx];
          if (revealAmount > 0) {
            const x = col * mosaicSize;
            const y = row * mosaicSize;
            ctx.globalAlpha = revealAmount;
            ctx.drawImage(
              img,
              x, y, mosaicSize, mosaicSize,
              x, y, mosaicSize, mosaicSize
            );
          }
        }
      }
      ctx.globalAlpha = 1;

      requestAnimationFrame(drawMosaic);
    }

    galleryCanvas.addEventListener('mousedown', (e) => {
      const rect = galleryCanvas.getBoundingClientRect();
      const scaleX = canvasWidth / rect.width;
      const scaleY = canvasHeight / rect.height;
      mousePos.x = (e.clientX - rect.left) * scaleX;
      mousePos.y = (e.clientY - rect.top) * scaleY;
    });

    galleryCanvas.addEventListener('mouseleave', () => {
      mousePos = { x: -1000, y: -1000 };
    });

    galleryCanvas.addEventListener('mousemove', (e) => {
      const rect = galleryCanvas.getBoundingClientRect();
      const scaleX = canvasWidth / rect.width;
      const scaleY = canvasHeight / rect.height;
      mousePos.x = (e.clientX - rect.left) * scaleX;
      mousePos.y = (e.clientY - rect.top) * scaleY;
    });

    const cat = document.getElementById('cat');
    let isDragging = false, startX, startY;

    cat.addEventListener('mousedown', (e) => {
      isDragging = true;
      const catRect = cat.getBoundingClientRect();
      startX = e.clientX - catRect.left;
      startY = e.clientY - catRect.top;
      cat.style.cursor = 'grabbing';
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const newX = e.clientX - startX;
      const newY = e.clientY - startY;
      cat.style.left = newX + 'px';
      cat.style.top = newY + 'px';
      cat.style.bottom = 'auto';
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
      cat.style.cursor = 'grab';
    });

    cat.addEventListener('click', () => {
      if (!isDragging) triggerPurr();
    });

    function triggerPurr() {
      cat.classList.add('purring', 'happy');
      let flashCount = 0;
      const purrInterval = setInterval(() => {
        triggerMosaicFlash('extreme');
        flashCount++;
        if (flashCount >= 15) {
          clearInterval(purrInterval);
          setTimeout(() => cat.classList.remove('purring', 'happy'), 100);
        }
      }, 100);
    }

    const mosaicOverlay = document.getElementById('mosaic-overlay'), mosaicCells = [];
    function initMosaic() {
      for (let i = 0; i < 300; i++) {
        const cell = document.createElement('div');
        cell.className = 'mosaic-cell';
        mosaicOverlay.appendChild(cell);
        mosaicCells.push(cell);
      }
    }
    function triggerMosaicFlash(intensity = 'low') {
      const colors = ['rgba(255,0,179,0.9)','rgba(0,255,255,0.9)','rgba(255,0,102,0.85)','rgba(102,255,255,0.85)','rgba(255,102,178,0.8)'];
      const count = intensity === 'extreme'
        ? Math.floor(Math.random() * 15) + 25
        : Math.floor(Math.random() * (intensity === 'high' ? 18 : 5)) + (intensity === 'high' ? 10 : 2);
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          const cell = mosaicCells[Math.floor(Math.random() * mosaicCells.length)];
          cell.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          cell.style.opacity = '1';
          cell.style.transition = `opacity ${Math.random() * 300 + 500}ms`;
          setTimeout(() => { cell.style.opacity = '0'; }, 150);
        }, i * Math.random() * 100);
      }
    }
    function ambientFlash() {
      triggerMosaicFlash('low');
      setTimeout(ambientFlash, Math.random() * 300 + 200);
    }
    initMosaic();
    setTimeout(ambientFlash, 500);

    // 页面转场动画系统
    const pageTransition = document.getElementById('page-transition');
    const transitionCells = [];
    const pageContent = document.getElementById('page-content');

    // 初始化转场单元格
    function initPageTransition() {
      for (let i = 0; i < 300; i++) {
        const cell = document.createElement('div');
        cell.className = 'page-transition-cell';
        pageTransition.appendChild(cell);
        transitionCells.push(cell);
      }
      // 页面加载时闪烁覆盖层逐渐消逝
      setTimeout(() => {
        transitionCells.forEach((cell, index) => {
          const delay = (index % 20) * 15 + Math.floor(index / 20) * 20;
          setTimeout(() => {
            cell.classList.add('fade');
          }, delay);
        });
        pageContent.classList.add('loaded');
      }, 100);
    }

    // 转场动画函数
    function navigateToPage(url) {
      // 闪烁铺满屏幕
      transitionCells.forEach((cell, index) => {
        const delay = Math.floor(index / 20) * 30 + (index % 20) * 10;
        setTimeout(() => {
          cell.classList.remove('fade');
        }, delay);
      });

      // 铺满后跳转
      setTimeout(() => {
        window.location.href = url;
      }, 1200);
    }

    // 拦截所有带 data-transition 的链接
    document.querySelectorAll('[data-transition]').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const url = link.getAttribute('href');
        navigateToPage(url);
      });
    });

    initPageTransition();

    // 返回按钮点击特效（已并入转场系统）
  </script>
</body>
</html>
